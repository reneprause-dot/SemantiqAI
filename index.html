<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyglot Flashcards AI Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">
</head>
<body>
    <div class="app-container">
        <header id="app-header">
            <h1 id="ui-title">🌍 Polyglot Learn</h1>
            <div class="header-controls">
                <button id="settings-btn" title="Einstellungen">⚙️</button>
                <button id="install-btn" style="display: none;">App installieren</button>
            </div>
        </header>

        <section class="special-modes">
            <button id="polyglot-toggle" class="mode-badge">🔀 Polyglottes Netz: AUS</button>
            <div class="ai-filters">
                <button id="filter-normal" class="filter-btn active">📝 Standard</button>
                <button id="filter-culture" class="filter-btn">🏮 Kultur</button>
                <button id="filter-slang" class="filter-btn">🔥 Slang</button>
            </div>
        </section>

        <section class="language-select" id="lang-select-section">
            <div class="select-box">
                <label id="ui-lang-label" for="ui-lang">📱 App-Sprache:</label>
                <select id="ui-lang"></select>
            </div>
            <div class="lang-row">
                <div class="select-box">
                    <label id="ui-src-label" for="src-lang">Ich spreche:</label>
                    <select id="src-lang"></select>
                </div>
                <div class="select-box">
                    <label id="ui-target-label" for="target-lang">Ich lerne:</label>
                    <select id="target-lang"></select>
                </div>
            </div>
        </section>

        <main class="flashcard-container">
            <div class="card" id="flashcard">
                <div class="card-front">
                    <div style="margin: auto;">
                        <p class="lang-label" id="front-lang-label">Ausgangssprache</p>
                        <h2 id="card-question">Wort</h2>
                    </div>
                </div>
                <div class="card-back">
                    <div style="margin: auto; width: 100%;">
                        <p class="lang-label" id="back-lang-label">Zielsprache</p>
                        <h2 id="card-answer">Übersetzung</h2>
                        <div class="card-back-buttons">
                            <button id="listen-btn" class="mini-btn">🔊 Hören</button>
                            <button id="ai-btn" class="mini-btn ai-sparkle">✨ KI-Erklärung</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <section id="ai-response-box" class="ai-box" style="display: none;">
            <div class="ai-loading" id="ai-loading">⚡ Claude denkt nach...</div>
            <div id="ai-content"></div>
        </section>

        <section class="controls">
            <button id="flip-btn" class="btn secondary">Umdrehen</button>
            <div class="action-buttons" id="action-btns" style="display: none;">
                <button id="wrong-btn" class="btn danger">Falsch ❌</button>
                <button id="correct-btn" class="btn success">Richtig ✔️</button>
            </div>
            <button id="next-btn" class="btn primary" style="display: none;">Nächstes Wort</button>
        </section>

        <footer>
            <p id="progress-text">Fortschritt: 0 / 0</p>
            <p class="dev-credits">Entwickelt von René Prause | Stand: 17.05.2026</p>
        </footer>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="ui-settings-title">⚙️ Einstellungen & Design</h3>
                <span class="close-modal" id="close-modal-btn">&times;</span>
            </div>
            
            <div class="settings-section">
                <h4>🤖 Claude KI Assistent</h4>
                <div class="input-group">
                    <label for="api-key">Anthropic API Key:</label>
                    <input type="password" id="api-key" placeholder="sk-ant-api03-...">
                </div>
                <div class="input-group">
                    <label for="ai-model">Modell:</label>
                    <select id="ai-model">
                        <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                        <option value="claude-3-5-haiku-20241022">Claude 3.5 Haiku</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h4>🎨 Designs & Farbpalette</h4>
                <div class="theme-presets">
                    <button type="button" class="preset-btn" id="preset-light">☀️ Hellmodus</button>
                    <button type="button" class="preset-btn" id="preset-dark">🌙 Dunkelmodus</button>
                    <button type="button" class="preset-btn" id="preset-cyber">🔮 Cyberpunk</button>
                    <button type="button" class="preset-btn" id="preset-classic">🔷 Klassisch</button>
                </div>
                <div class="color-pickers" style="margin-top: 12px;">
                    <div class="color-picker-item"><label for="color-primary">Hauptfarbe:</label><input type="color" id="color-primary" value="#4A90E2"></div>
                    <div class="color-picker-item"><label for="color-bg">Hintergrund:</label><input type="color" id="color-bg" value="#F5F7FA"></div>
                    <div class="color-picker-item"><label for="color-card">Kartenfarbe:</label><input type="color" id="color-card" value="#FFFFFF"></div>
                    <div class="color-picker-item"><label for="color-text">Textfarbe:</label><input type="color" id="color-text" value="#333333"></div>
                </div>
            </div>

            <div class="settings-section">
                <h4>🔄 System</h4>
                <button id="update-btn" class="btn secondary" style="padding: 8px; font-size: 0.9rem;">🔄 Auf Update prüfen</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="cancel-settings-btn" class="btn secondary" type="button">Abbrechen</button>
                <button id="save-settings-btn" class="btn primary">Speichern</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
